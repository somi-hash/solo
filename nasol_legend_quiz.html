<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나솔 레전드 명대사 퀴즈</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --p:#7C6CF0;--pl:#EEF0FF;--pd:#4A3FD4;
  --pink:#F26BA0;--pink-l:#FFECF5;
  --green:#27AE60;--green-l:#EAFAF1;
  --red:#E74C3C;--red-l:#FDEDEC;
  --amber:#E67E22;--amber-l:#FEF5EC;
  --bg:#F7F5FF;--card:#fff;
  --t:#1A1A2E;--t2:#6B6B8A;
  --bd:rgba(124,108,240,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.wrap{max-width:540px;margin:0 auto;padding:1.5rem 1.25rem 5rem}

.header{text-align:center;padding-top:1rem;margin-bottom:1.75rem}
.badge{display:inline-block;background:var(--pl);color:var(--pd);font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;margin-bottom:.75rem}
h1{font-size:24px;font-weight:700;line-height:1.3}
.sub{font-size:14px;color:var(--t2);margin-top:.4rem;line-height:1.6}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:1.5rem;margin-bottom:1rem}

/* 인트로 */
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.info-box{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:14px 8px;text-align:center}
.info-num{font-size:20px;font-weight:700;color:var(--pd)}
.info-label{font-size:11px;color:var(--t2);margin-top:3px}
.type-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.type-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);font-size:13px;line-height:1.5}
.ti{font-size:18px;flex-shrink:0}
.start-btn{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.start-btn:hover{background:var(--pd)}

/* 진행바 */
.prog-wrap{margin-bottom:1.25rem}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:13px;color:var(--t2)}
.score-pill{font-size:13px;font-weight:700;color:var(--pd);background:var(--pl);padding:3px 12px;border-radius:99px}
.prog-track{height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--pink));border-radius:99px;transition:width .5s ease}

/* 기수 태그 */
.kisu-row{display:flex;align-items:center;gap:8px;margin-bottom:.875rem;flex-wrap:wrap}
.kisu-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--pl);color:var(--pd)}
.q-type-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.qt-blank{background:var(--amber-l);color:var(--amber)}
.qt-next{background:var(--pink-l);color:var(--pink)}
.qt-ox{background:var(--green-l);color:var(--green)}

/* 유튜브 */
.yt-wrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:12px;overflow:hidden;margin-bottom:1rem;background:#000}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.yt-label{font-size:11px;color:var(--t2);margin-bottom:1rem;display:flex;align-items:center;gap:4px}

/* 상황 박스 (다음 대사 유형) */
.scene-box{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:1rem 1.125rem;margin-bottom:1rem;font-size:13px;line-height:1.8;color:var(--t2)}
.scene-box strong{color:var(--t)}
.scene-box .speaker{display:inline-block;background:var(--pl);color:var(--pd);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;margin-right:4px}

/* 대사 박스 */
.quote-box{background:var(--bg);border-left:3px solid var(--p);border-radius:0 10px 10px 0;padding:1rem 1.25rem;margin-bottom:1rem;font-size:16px;font-weight:500;line-height:1.8;color:var(--t)}
.blank{display:inline-block;min-width:70px;border-bottom:2.5px solid var(--p);color:var(--p);font-weight:900;text-align:center;padding:0 4px}
.quote-fade{color:var(--t2);font-style:italic}
.hint-txt{font-size:12px;color:var(--t2);margin-top:.375rem;font-style:italic}

/* 질문 */
.q-text{font-size:16px;font-weight:700;color:var(--t);line-height:1.5;margin-bottom:1rem}

/* 선택지 */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;padding:13px 16px;border:1.5px solid var(--bd);border-radius:12px;font-size:14px;font-family:inherit;color:var(--t);background:var(--bg);cursor:pointer;transition:all .15s;line-height:1.5;display:flex;align-items:center;gap:10px}
.opt:hover:not(:disabled){border-color:var(--p);background:var(--pl)}
.opt:disabled{cursor:default}
.opt-key{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--t2)}
.opt.correct{border-color:var(--green)!important;background:var(--green-l)!important}
.opt.correct .opt-key{border-color:var(--green);background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red)!important;background:var(--red-l)!important}
.opt.wrong .opt-key{border-color:var(--red);background:var(--red);color:#fff}
.opt.dimmed{opacity:.35}

/* 해설 */
.explain{margin-top:1rem;padding:1rem 1.125rem;border-radius:12px;font-size:13px;line-height:1.75;border:1px solid}
.explain.c{background:var(--green-l);border-color:#27AE6025}
.explain.w{background:var(--red-l);border-color:#E74C3C25}
.el{font-size:14px;font-weight:700;display:block;margin-bottom:.35rem}
.et{color:var(--t);opacity:.85}

.next-btn{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:1rem;display:none}
.next-btn:hover{background:var(--pd)}
.next-btn.show{display:block}

/* 결과 */
.result-top{text-align:center;padding:1rem 0 1.25rem}
.r-emoji{font-size:56px;margin-bottom:.75rem}
.r-score{font-size:48px;font-weight:900;color:var(--pd)}
.r-denom{font-size:18px;color:var(--t2)}
.r-grade{display:inline-block;padding:6px 20px;border-radius:99px;font-size:14px;font-weight:700;margin-top:.75rem}
.r-msg{font-size:14px;line-height:1.8;color:var(--t2);margin-top:.875rem}
.divider{height:1px;background:var(--bd);margin:1.25rem 0}
.review-ttl{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--t2);margin-bottom:.875rem}
.review-list{display:flex;flex-direction:column;gap:7px}
.ri{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.ri.ok{background:var(--green-l)}
.ri.fail{background:var(--red-l)}
.ri-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.ri-q{font-weight:500;color:var(--t)}
.ri-ans{color:var(--t2);font-size:12px;margin-top:2px}
.retry-btn{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:1.25rem}

.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

<!-- 인트로 -->
<div id="s-intro">
  <div class="header">
    <div class="badge">🎬 나솔 레전드</div>
    <h1>명대사 퀴즈</h1>
    <p class="sub">역대 레전드 기수 명대사 빈칸 채우기!<br>영상 보고 감 잡아서 맞혀보세요 🌹</p>
  </div>
  <div class="card">
    <div class="info-row">
      <div class="info-box"><div class="info-num">10</div><div class="info-label">문제</div></div>
      <div class="info-box"><div class="info-num">6~18기</div><div class="info-label">레전드 기수</div></div>
      <div class="info-box"><div class="info-num">유튜브</div><div class="info-label">클립 포함</div></div>
    </div>
    <div class="type-list">
      <div class="type-item"><span class="ti">💬</span><div><strong>빈칸 채우기</strong> — 명대사의 핵심 단어를 맞혀보세요</div></div>
      <div class="type-item"><span class="ti">➡️</span><div><strong>다음 대사는?</strong> — 기수·상황 설명 후, 이 때 ○○이 한 말은?</div></div>
      <div class="type-item"><span class="ti">⭕</span><div><strong>맞다 틀리다</strong> — 실제로 있었던 대사인지 판별</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">퀴즈 시작 🔥</button>
  </div>
</div>

<!-- 퀴즈 -->
<div id="s-quiz" class="hidden">
  <div class="prog-wrap">
    <div class="prog-meta">
      <span class="prog-label" id="prog-label">1 / 10</span>
      <span class="score-pill" id="score-pill">0점</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="card" id="q-card"></div>
</div>

<!-- 결과 -->
<div id="s-result" class="hidden">
  <div class="header"><div class="badge">🏆 최종 결과</div></div>
  <div class="card">
    <div class="result-top">
      <div class="r-emoji" id="r-emoji"></div>
      <div><span class="r-score" id="r-score"></span><span class="r-denom"> / 10점</span></div>
      <div class="r-grade" id="r-grade"></div>
      <div class="r-msg" id="r-msg"></div>
    </div>
    <div class="divider"></div>
    <div class="review-ttl">문제별 결과</div>
    <div class="review-list" id="r-review"></div>
    <button class="retry-btn" onclick="retryQuiz()">다시 도전 🔄</button>
  </div>
</div>

</div>

    ytLabel: '📺 나솔 공식 채널',
    quoteHtml: `"보고싶어<span class='blank'>__</span>!"`,
    hint: '귀엽게 말하는 말투로 마무리하는 두 글자',
    q: '13기 광수의 레전드 문자 명대사 빈칸은?',
    opts: ['요', '쪙', '용', '잖아'],
    answer: 1,
    okEmoji: '💌', failEmoji: '😂',
    explain: '"보고싶어쪙!" — 13기 광수(삼성전자 코딩)의 레전드 문자 명대사. 나솔 역사상 가장 독특한 애교 표현으로, 이후 "쪙"이라는 표현 자체가 나솔 밈이 됐어요.'
  },

  // Q10 — 18기 / 다음 대사
  {
    kisu: '18기', type: 'next', typeLabel: '➡️ 다음 대사는?',
    ytId: 'vJezSPrLp14', ytStart: 0,
    ytLabel: '📺 나는솔로 16기 요약 (18기 맥락 참고)',
    scene: `<strong>18기 빌런 대방출 기수.</strong> 출연자들이 서로 스펙과 조건을 이야기하는 자리. <span class="speaker">18기 옥순</span>이 나이와 연봉 관계에 대해 매우 직접적으로 자신의 기준을 밝혔다.`,
    quoteHtml: `"연봉이 작으면`,
    hint: '나이 많아도 연봉이 적으면 서열이 뒤집힌다는 뜻',
    q: '이 상황에서, 18기 옥순이 한 말은?',
    opts: [
      '"그냥 친구야."',
      '"오빠도 동생."',
      '"남자도 아니야."',
      '"만날 필요 없어."'
    ],
    answer: 1,
    okEmoji: '😶', failEmoji: '😂',
    explain: '"연봉이 작으면 오빠도 동생." — 18기 옥순의 레전드 발언. 나이가 아닌 연봉으로 서열을 정하겠다는 이 직진 발언은 방영 후 온라인을 강타했어요. 18기는 빌런 대방출 기수로 역대급 어록이 쏟아진 기수예요.'
  }
];

let cur = 0, score = 0, answered = false, results = [];

function startQuiz() {
  cur = 0; score = 0; answered = false; results = [];
  document.getElementById('s-intro').classList.add('hidden');
  document.getElementById('s-result').classList.add('hidden');
  document.getElementById('s-quiz').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  const q = QS[cur];
  document.getElementById('prog-label').textContent = `${cur + 1} / ${QS.length}`;
  document.getElementById('score-pill').textContent = `${score}점`;
  document.getElementById('prog-fill').style.width = `${(cur / QS.length) * 100}%`;
  answered = false;

  // 유형별 추가 콘텐츠
  let extraHtml = '';
  if (q.type === 'next' && q.scene) {
    extraHtml = `<div class="scene-box">${q.scene}</div>`;
  }

  // 대사 박스
  const quoteHtml = `<div class="quote-box">${q.quoteHtml}${q.type === 'next' ? ' <span class="quote-fade">…?</span>' : ''}</div>
    ${q.hint ? `<p class="hint-txt">💡 힌트: ${q.hint}</p>` : ''}`;

  const optsHtml = q.opts.map((o, i) => `
    <button class="opt" id="opt-${i}" onclick="pick(${i})">
      <span class="opt-key">${['A','B','C','D'][i]}</span>
      <span>${o}</span>
    </button>`).join('');

  const typeCls = q.type === 'blank' ? 'qt-blank' : q.type === 'next' ? 'qt-next' : 'qt-ox';

  document.getElementById('q-card').innerHTML = `
    <div class="kisu-row">
      <span class="kisu-tag">${q.kisu}</span>
      <span class="q-type-tag ${typeCls}">${q.typeLabel}</span>
    </div>

    <div class="yt-wrap">
      <iframe src="https://www.youtube.com/embed/${q.ytId}?start=${q.ytStart}&rel=0" allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="yt-label">▶ ${q.ytLabel}</div>

    ${extraHtml}
    ${quoteHtml}

    <div class="q-text">${q.q}</div>
    <div class="opts">${optsHtml}</div>
    <div id="explain-area"></div>
    <button class="next-btn" id="next-btn" onclick="goNext()">
      ${cur === QS.length - 1 ? '결과 보기 🏆' : '다음 문제 →'}
    </button>
  `;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = QS[cur];
  const correct = i === q.answer;
  if (correct) score++;
  results.push({ q: q.q, correct, userAns: q.opts[i], correctAns: q.opts[q.answer] });
  document.getElementById('score-pill').textContent = `${score}점`;

  q.opts.forEach((_, idx) => {
    const btn = document.getElementById(`opt-${idx}`);
    btn.disabled = true;
    if (idx === q.answer) btn.classList.add('correct');
    else if (idx === i) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  const emoji = correct ? q.okEmoji : q.failEmoji;
  const cls = correct ? 'c' : 'w';
  const label = correct ? `${emoji} 정답!` : `${emoji} 오답!  정답: ${q.opts[q.answer]}`;
  document.getElementById('explain-area').innerHTML = `
    <div class="explain ${cls}">
      <span class="el">${label}</span>
      <span class="et">${q.explain}</span>
    </div>`;
  document.getElementById('next-btn').classList.add('show');
}

function goNext() {
  if (cur < QS.length - 1) { cur++; renderQ(); }
  else showResult();
}

function showResult() {
  document.getElementById('s-quiz').classList.add('hidden');
  document.getElementById('s-result').classList.remove('hidden');
  let emoji, grade, msg, gb, gc;
  if (score >= 9) {
    emoji='👑'; grade='나솔 마스터'; gb='#FEF9E7'; gc='#8B6914';
    msg='완벽! 기수별 명대사를 전부 외우고 있는 진짜 나솔러. 솔로나라 명예 촌장 자격 있음 🏆';
  } else if (score >= 7) {
    emoji='🔥'; grade='나솔 찐팬'; gb='#EEF0FF'; gc='#4A3FD4';
    msg='대부분 맞혔어요! 레전드 기수들 제대로 섭렵한 진짜 팬이에요.';
  } else if (score >= 5) {
    emoji='😎'; grade='나솔 중급자'; gb='#EAFAF1'; gc='#1A7A4A';
    msg='절반 이상 맞혔어요! 6기→9기→10기 정주행하면 마스터 등극 가능해요.';
  } else if (score >= 3) {
    emoji='🙂'; grade='나솔 입문자'; gb='#FFECF5'; gc='#C2185B';
    msg='아직 나솔 초보 단계예요. 9기부터 시작해서 레전드 기수 쭉 보면 다 맞힐 수 있어요!';
  } else {
    emoji='😅'; grade='나솔 뉴비'; gb='#FDEDEC'; gc='#922B21';
    msg='지금 당장 유튜브에 "나솔 레전드" 검색! 인생 예능이 기다리고 있어요 😂';
  }
  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-score').textContent = score;
  const rg = document.getElementById('r-grade');
  rg.textContent = grade; rg.style.background = gb; rg.style.color = gc;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-review').innerHTML = results.map((r, i) => `
    <div class="ri ${r.correct ? 'ok' : 'fail'}">
      <span class="ri-icon">${r.correct ? '✅' : '❌'}</span>
      <div>
        <div class="ri-q">Q${i+1}. ${r.q}</div>
        ${!r.correct ? `<div class="ri-ans">내 답: ${r.userAns}<br>정답: ${r.correctAns}</div>` : ''}
      </div>
    </div>`).join('');
}

function retryQuiz() {
  document.getElementById('s-result').classList.add('hidden');
  startQuiz();
}
</script>
</body>
</html>
