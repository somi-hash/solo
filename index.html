<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나솔 캐릭터 매칭 테스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --p:#7C6CF0;--pl:#EEF0FF;--pd:#4A3FD4;
  --pink:#F26BA0;--pink-l:#FFECF5;
  --bg:#F7F5FF;--card:#fff;
  --t:#1A1A2E;--t2:#6B6B8A;
  --bd:rgba(124,108,240,0.15);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.tab-nav{position:sticky;top:0;z-index:100;background:rgba(247,245,255,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);display:flex}
.tab-btn{flex:1;padding:14px 0;font-size:14px;font-weight:700;font-family:inherit;border:none;background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;border-bottom:2.5px solid transparent}
.tab-btn.on{color:var(--p);border-bottom-color:var(--p)}
.wrap{max-width:520px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
.badge{display:inline-block;background:var(--pl);color:var(--pd);font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;margin-bottom:.75rem}
.header{text-align:center;margin-bottom:1.75rem;padding-top:.5rem}
h1{font-size:23px;font-weight:700;line-height:1.3}
.sub{font-size:14px;color:var(--t2);margin-top:.4rem}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
input[type=text]{width:100%;padding:12px 16px;border:1px solid var(--bd);border-radius:10px;font-size:15px;font-family:inherit;color:var(--t);background:var(--bg);outline:none;margin-bottom:1.25rem;transition:border-color .2s}
input[type=text]:focus{border-color:var(--p)}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.gb{border:1.5px solid var(--bd);border-radius:12px;padding:1.25rem 1rem;text-align:center;cursor:pointer;background:var(--bg);transition:all .15s}
.gb:hover,.gb.on{border-color:var(--p);background:var(--pl)}
.gi{font-size:28px;margin-bottom:6px}
.gn{font-size:15px;font-weight:700}
.gc{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5}
.bmain{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.bmain:hover{background:var(--pd)}
.bmain:disabled{opacity:.4;cursor:default}
.pw{margin-bottom:1.25rem}
.pm{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:8px}
.pt{height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.pf{height:100%;background:var(--p);border-radius:99px;transition:width .4s ease}
.qt{font-size:17px;font-weight:700;margin-bottom:1.25rem;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{text-align:left;padding:13px 16px;border:1px solid var(--bd);border-radius:12px;font-size:14px;font-family:inherit;color:var(--t);background:var(--bg);cursor:pointer;transition:all .15s;line-height:1.5}
.opt:hover{border-color:var(--p);background:var(--pl)}
.opt.on{border-color:var(--p);background:var(--pl);color:var(--pd);font-weight:500}
.nav{display:flex;gap:10px;margin-top:1.5rem}
.nav button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.bprev{background:var(--bg);border:1px solid var(--bd);color:var(--t2)}
.bprev:disabled{opacity:.3;cursor:default}
.bnext{background:var(--p);border:none;color:#fff}
.bnext:hover{background:var(--pd)}
.rh{text-align:center;margin-bottom:1.5rem}
.re{font-size:52px;margin-bottom:.5rem}
.rc{font-size:32px;font-weight:700;color:var(--pd)}
.rs{font-size:14px;color:var(--t2);margin-top:4px}
.rd{font-size:14px;line-height:1.8;margin-bottom:1rem}
.traits{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.5rem}
.trait{background:var(--pl);color:var(--pd);font-size:12px;font-weight:500;padding:4px 12px;border-radius:99px}
.stt{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.05em;margin-bottom:10px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.sn{font-size:13px;color:var(--t2);width:38px;flex-shrink:0}
.st{flex:1;height:6px;background:var(--pl);border-radius:99px;overflow:hidden}
.sb{height:100%;border-radius:99px;background:var(--p)}
.sb.top{background:var(--pink)}
.sv{font-size:12px;color:var(--t2);width:28px;text-align:right;flex-shrink:0}
.bsec{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--bg);border:1px solid var(--bd);color:var(--t);margin-top:1rem}
.save-status{text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-top:.75rem}
.save-status.saving{background:#FEF9E7;color:#8B6914}
.save-status.done{background:var(--pl);color:var(--pd)}
.save-status.fail{background:#FDEDEC;color:#922B21}
.stat-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.ssum{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center}
.ssum-num{font-size:24px;font-weight:700;color:var(--pd)}
.ssum-label{font-size:11px;color:var(--t2);margin-top:2px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--t2);margin-bottom:10px;margin-top:1.5rem}
.sec-title:first-of-type{margin-top:0}
.p-list{display:flex;flex-direction:column;gap:8px}
.p-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--bd)}
.p-av{width:36px;height:36px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--pd);flex-shrink:0}
.p-name{font-size:14px;font-weight:500}
.p-info{font-size:12px;color:var(--t2)}
.p-tag{margin-left:auto;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0}
.p-tag.f{background:var(--pink-l);color:#C2185B}
.p-tag.m{background:#E8EAF6;color:#3949AB}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.char-card{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s}
.char-card:hover{border-color:var(--p);background:var(--pl)}
.char-card .ce{font-size:22px;margin-bottom:4px}
.char-card .cn{font-size:13px;font-weight:700}
.char-card .ck{font-size:20px;font-weight:700;color:var(--pd);margin-top:4px}
.char-card .cbw{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:6px}
.char-card .cb{height:100%;background:var(--p);border-radius:99px}
.char-card .cb.f{background:var(--pink)}
.char-card.zero{opacity:.5}
.stat-refresh{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.refresh-btn{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;color:var(--t2);cursor:pointer}
.refresh-btn:hover{border-color:var(--p);color:var(--p)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:1.75rem 1.5rem 2.5rem;width:100%;max-width:520px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:99px;margin:0 auto 1.25rem}
.modal-close{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:1rem}
.modal-p{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px}
.m-traits{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem}
.empty{font-size:14px;color:var(--t2);text-align:center;padding:2.5rem 0}
.hidden{display:none}
</style>
</head>
<body>

<div class="tab-nav">
  <button class="tab-btn on" onclick="switchTab('quiz')">🌹 테스트</button>
  <button class="tab-btn" onclick="switchTab('stat')">📊 전체 결과</button>
</div>

<div id="tab-quiz">
<div class="wrap">
  <div id="ss">
    <div class="header">
      <div class="badge">솔로나라 입장</div>
      <h1>나솔 캐릭터<br>매칭 테스트</h1>
      <p class="sub">10개의 질문으로 나의 솔로나라 캐릭터를 찾아드립니다</p>
    </div>
    <div class="card">
      <label>이름 (닉네임도 OK)</label>
      <input type="text" id="ni" placeholder="이름을 입력해주세요" maxlength="10">
      <div style="font-size:13px;font-weight:500;color:var(--t2);margin-bottom:10px">성별 선택</div>
      <div class="gg">
        <button class="gb" id="bf" onclick="selG('여')">
          <div class="gi">👩</div><div class="gn">여성</div>
          <div class="gc">영숙 · 정숙 · 순자<br>영자 · 옥순 · 현숙</div>
        </button>
        <button class="gb" id="bm" onclick="selG('남')">
          <div class="gi">👨</div><div class="gn">남성</div>
          <div class="gc">영수 · 광수 · 영호<br>영식 · 영철 · 상철</div>
        </button>
      </div>
      <button class="bmain" id="sb" onclick="startQ()" disabled>시작하기</button>
    </div>
  </div>

  <div id="sq" class="hidden">
    <div class="pw">
      <div class="pm"><span id="qn">1 / 10</span><span id="un" style="font-weight:500"></span></div>
      <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="qt" id="qt"></div>
      <div class="opts" id="op"></div>
      <div class="nav">
        <button class="bprev" id="pb" onclick="goPrev()">이전</button>
        <button class="bnext" id="nb" onclick="goNext()">다음</button>
      </div>
    </div>
  </div>

  <div id="sr" class="hidden">
    <div class="header"><div class="badge">🎉 결과 공개</div></div>
    <div class="card">
      <div class="rh">
        <div class="re" id="re"></div>
        <div class="rc" id="rc"></div>
        <div class="rs" id="rs"></div>
      </div>
      <div class="rd" id="rd"></div>
      <div class="traits" id="rt"></div>
      <div class="stt">내 점수 분포</div>
      <div id="rb"></div>
      <div class="save-status hidden" id="save-status"></div>
      <button class="bsec" onclick="restart()">다시 하기</button>
    </div>
  </div>
</div>
</div>

<div id="tab-stat" class="hidden">
<div class="wrap">
  <div class="header">
    <div class="badge">📊 솔로나라 현황</div>
    <h1>전체 참여 결과</h1>
  </div>
  <div class="stat-refresh">
    <button class="refresh-btn" onclick="renderStat()">🔄 새로고침</button>
    <span style="font-size:12px;color:var(--t2)" id="stat-updated"></span>
  </div>
  <div id="stat-body"></div>
</div>
</div>

<div class="modal-bg hidden" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="font-size:40px;margin-bottom:.5rem" id="m-emoji"></div>
    <div style="font-size:22px;font-weight:700;color:var(--pd);margin-bottom:.25rem" id="m-name"></div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:1rem" id="m-persona"></div>
    <div style="font-size:14px;line-height:1.8;margin-bottom:1rem" id="m-desc"></div>
    <div class="m-traits" id="m-traits"></div>
    <div style="font-size:13px;font-weight:500;color:var(--t2);margin-bottom:.75rem" id="m-who"></div>
    <div id="m-parts"></div>
    <button class="modal-close" onclick="document.getElementById('modal-bg').classList.add('hidden')">닫기</button>
  </div>
</div>

<script>
const APPS_URL='https://script.google.com/macros/s/AKfycbzXZqVGO18OgBwiVo61HfHxTNxCQpsOqFlNE3_VX6jbHJd8utufJobbe1Xm--QZo-_Yaw/exec';

const Qs=[
  {q:"주말 일정이 갑자기 비었다. 나는?",opts:[
    {t:"계획 없이 있다가 끌리는 대로 간다",s:{순자:2,영호:1}},
    {t:"미리 짜놓은 혼자만의 루틴을 실행한다",s:{영숙:1,광수:2}},
    {t:"친구한테 먼저 연락해 같이 뭔가를 기획한다",s:{영자:2,영식:1}},
    {t:"집에서 조용히 쉰다. 그게 제일 좋다",s:{현숙:2,상철:1}}
  ]},
  {q:"나의 직장 동료들은 나를 어떻게 볼 것 같아?",opts:[
    {t:"일 잘하고 믿음직하다",s:{영숙:2,영수:2}},
    {t:"솔직하고 직선적이다",s:{정숙:2,영자:1}},
    {t:"스마트한데 가끔 좀 독특하다",s:{광수:2,영식:1}},
    {t:"분위기를 살리는 에너지가 있다",s:{영자:2,순자:1}},
    {t:"무난하고 든든한 사람",s:{상철:2,현숙:2}}
  ]},
  {q:"팀 회의에서 의견 충돌이 생기면 나는?",opts:[
    {t:"내 생각을 명확하게 말하고 밀고 나간다",s:{영숙:2,정숙:1}},
    {t:"논리적으로 분석해서 설득한다",s:{광수:2,영수:1}},
    {t:"분위기 살피면서 중간을 잡으려 한다",s:{상철:2,영호:1}},
    {t:"내 주장은 있지만 일단 흐름을 본다",s:{순자:2,현숙:1}},
    {t:"나중에 따로 얘기하는 편이다",s:{영식:2,영철:1}}
  ]},
  {q:"마음에 드는 사람이 생겼을 때 나는?",opts:[
    {t:"확신이 생기면 먼저 다가간다",s:{영숙:2,정숙:1}},
    {t:"상대방이 나한테 오게 만든다",s:{광수:2,옥순:2}},
    {t:"감정이 생겨도 오래 지켜보고 천천히 간다",s:{영수:2,영호:2}},
    {t:"분위기 좋으면 자연스럽게 흘러가는 스타일",s:{영자:2,현숙:1}},
    {t:"주변 반응 신경 안 쓰고 내 마음대로 한다",s:{순자:2,영식:1}}
  ]},
  {q:"스트레스를 받으면 나는?",opts:[
    {t:"혼자 정리하고 해결책을 찾는다",s:{영숙:2,광수:2}},
    {t:"친한 사람한테 털어놓고 공감받는다",s:{정숙:2,영자:1}},
    {t:"그냥 시간이 지나면 나아진다고 생각한다",s:{상철:2,현숙:1}},
    {t:"운동이나 몸을 쓰는 걸로 푼다",s:{영수:1,영철:2}},
    {t:"잠깐 혼자만의 시간이 필요하다",s:{순자:2,영호:1}}
  ]},
  {q:"내 외모나 스타일에 대한 솔직한 자기 평가는?",opts:[
    {t:"이 그룹에서 내가 제일 눈에 띈다고 생각한다",s:{옥순:3,영철:2}},
    {t:"꽤 단정하고 깔끔한 편이다",s:{영식:2,영숙:1}},
    {t:"외모보단 말과 분위기로 어필한다",s:{정숙:2,영자:1}},
    {t:"그냥 나는 나다, 잘 모르겠다",s:{상철:2,현숙:2}},
    {t:"스타일보다 능력이나 스펙이 강점이다",s:{광수:2,영수:1}}
  ]},
  {q:"모임에서 나의 자연스러운 포지션은?",opts:[
    {t:"자연스럽게 중심이 된다",s:{영숙:2,영자:1}},
    {t:"분위기를 살리는 서브 주연",s:{영자:2,정숙:1}},
    {t:"조용히 있는데 있어야 할 것 같은 느낌",s:{현숙:2,상철:2}},
    {t:"내 할 말만 하고 큰 존재감은 없다",s:{순자:2,영호:1}},
    {t:"좀 독특한 포지션, 혼자 다른 세계에 있음",s:{광수:2,영식:1}}
  ]},
  {q:"이상형을 고를 때 가장 중요하게 보는 건?",opts:[
    {t:"능력과 커리어",s:{영숙:2,광수:1}},
    {t:"외모나 첫인상",s:{옥순:2,영철:2}},
    {t:"감성과 대화가 통하는 느낌",s:{영호:2,정숙:1}},
    {t:"같이 있을 때 편한 사람",s:{상철:2,현숙:2}},
    {t:"나만의 기준이 있는데 설명하기 어렵다",s:{순자:2,영자:1}}
  ]},
  {q:"나이와 경험에 대해 내가 가진 태도는?",opts:[
    {t:"경험이 많은 만큼 내가 리드하는 게 맞다",s:{영수:2,정숙:2}},
    {t:"나이는 숫자, 실력이 중요하다",s:{광수:2,영숙:1}},
    {t:"막내지만 할 말은 한다",s:{순자:2,영자:1}},
    {t:"배우는 자세로 천천히 쌓아간다",s:{영호:2,현숙:1}},
    {t:"그냥 지금 내 나이대로 살면 된다",s:{상철:2,영식:1}}
  ]},
  {q:"솔직히 말하면, 나는?",opts:[
    {t:"내 기준이 높고 잘 타협 안 한다",s:{영숙:2,옥순:1}},
    {t:"하고 싶은 말을 못 참는다",s:{정숙:2,영자:2}},
    {t:"결정할 때 좀 오래 걸린다",s:{영호:2,영수:1}},
    {t:"남들한테 큰 관심 없고 내 거나 잘 하면 된다",s:{순자:2,광수:1}},
    {t:"그냥 무난하게 사는 게 최고다",s:{상철:2,현숙:2}}
  ]}
];

const CH={
  영숙:{g:'여',e:'💼',persona:'일 잘하는 커리어우먼 · 결혼율 1위',desc:"강단 있고 일 잘하는 커리어우먼. 기준이 높고 쉽게 타협하지 않지만, 그만큼 믿음직하다. 진심이 확실한 사람.",traits:["일 잘함","기준 높음","카리스마","직진형"]},
  정숙:{g:'여',e:'🗣️',persona:'솔직한 맏언니 · 직선적',desc:"솔직하고 맏언니 기질. 하고 싶은 말은 참지 않고, 팀에서 언제나 가장 현실적인 조언을 해주는 사람.",traits:["솔직함","맏언니","직선적","든든함"]},
  순자:{g:'여',e:'🎯',persona:'막내 · 마이웨이 · MZ세대',desc:"막내 기질에 마이웨이 정신. 분위기에 휩쓸리기보다 내 갈 길을 가는 스타일. 말수는 적어도 소신은 확실하다.",traits:["마이웨이","소신 있음","막내","독립적"]},
  영자:{g:'여',e:'✨',persona:'분위기 메이커 · 에너지 넘침',desc:"팀 분위기 살리는 에너지 덩어리. 가끔 오지라퍼 소리 듣지만 없으면 허전한 사람.",traits:["에너지 넘침","분위기 메이커","오지라퍼","적극적"]},
  옥순:{g:'여',e:'💅',persona:'비주얼 담당 · 강한 자기 세계관',desc:"이 팀에서 비주얼 담당. 강한 자기 세계관이 있고, 외모만큼 개성도 확실하다. 첫인상부터 눈에 띈다.",traits:["비주얼 담당","개성 강함","자기 세계관","반전 매력"]},
  현숙:{g:'여',e:'🌿',persona:'조용한 안정형 · 균형 감각',desc:"조용하지만 없으면 안 되는 사람. 균형 잡힌 무던함으로 팀의 안정감을 만들어준다.",traits:["무던함","균형 감각","안정적","내조형"]},
  영수:{g:'남',e:'🏛️',persona:'의젓한 맏형 · 이과 감성 · 최연장자',desc:"팀 최연장자, 의젓한 큰형. 고민할 때 조언을 구하게 되는 사람. 이과 감성에 묵직한 신뢰감이 있다.",traits:["의젓함","큰형 포지션","조언자","이과 감성"]},
  광수:{g:'남',e:'🧠',persona:'고스펙 브레인 · 독특한 매력',desc:"고스펙 브레인. 능력은 탑이고 논리는 완벽한데 가끔 독특한 행동으로 모두를 의아하게 만든다.",traits:["고스펙","브레인","독특함","자기 세계관"]},
  영호:{g:'남',e:'🌊',persona:'감성파 · 우유부단 · 섬세함',desc:"감성파에 결정이 느린 스타일. 분위기 잘 타고 공감 능력도 있지만, 결정적 순간에 흔들리는 것이 아쉬운 사람.",traits:["감성적","우유부단","공감 능력","섬세함"]},
  영식:{g:'남',e:'🎽',persona:'깔끔한 훈남 · 큰 키 · 착실',desc:"키 크고 단정한 훈남 스타일. 팀 내에서 이성과 동성 모두에게 호감을 얻는다.",traits:["깔끔한 외모","큰 키","착실함","호감형"]},
  영철:{g:'남',e:'💪',persona:'남성적 비주얼 · 선 굵은 존재감',desc:"선 굵고 남성적인 외모로 팀 내 비주얼 담당. 중저음 목소리와 묵직한 존재감이 있다.",traits:["남성적 외모","비주얼 담당","묵직함","존재감"]},
  상철:{g:'남',e:'⚖️',persona:'균형형 · 무난한 팀의 허리',desc:"두루두루 균형 잡힌 팀의 허리. 튀지 않지만 없으면 빈자리가 느껴지는 안정형.",traits:["균형형","무난함","안정적","팀의 허리"]}
};

const F_ORDER=['영숙','정숙','순자','영자','옥순','현숙'];
const M_ORDER=['영수','광수','영호','영식','영철','상철'];
const SK='nasol_local_v3';

function getLocal(){try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch{return[]}}
function addLocal(e){const d=getLocal();d.push(e);localStorage.setItem(SK,JSON.stringify(d))}

async function saveToSheet(entry){
  const el=document.getElementById('save-status');
  el.className='save-status saving';
  el.textContent='⏳ 결과 저장 중...';
  el.classList.remove('hidden');
  try{
    await fetch(APPS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)});
    el.className='save-status done';
    el.textContent='✅ 결과가 저장됐어요!';
  }catch(err){
    el.className='save-status fail';
    el.textContent='⚠️ 저장 실패 (네트워크 확인)';
  }
}

function switchTab(t){
  document.getElementById('tab-quiz').classList.toggle('hidden',t!=='quiz');
  document.getElementById('tab-stat').classList.toggle('hidden',t!=='stat');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',(i===0&&t==='quiz')||(i===1&&t==='stat')));
  if(t==='stat') renderStat();
}

let gender=null,uname='',cur=0,ans=[];
function selG(g){
  gender=g;
  document.getElementById('bf').classList.toggle('on',g==='여');
  document.getElementById('bm').classList.toggle('on',g==='남');
  chkStart();
}
function chkStart(){document.getElementById('sb').disabled=!(document.getElementById('ni').value.trim()&&gender);}
document.getElementById('ni').addEventListener('input',chkStart);

function showQ(id){['ss','sq','sr'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}

function startQ(){
  uname=document.getElementById('ni').value.trim();
  ans=new Array(Qs.length).fill(null);cur=0;
  document.getElementById('un').textContent=uname;
  showQ('sq');renderQ();
}

function renderQ(){
  const q=Qs[cur];
  document.getElementById('qn').textContent=`${cur+1} / ${Qs.length}`;
  document.getElementById('pf').style.width=`${(cur/Qs.length)*100}%`;
  document.getElementById('qt').textContent=q.q;
  const el=document.getElementById('op');el.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(ans[cur]===i?' on':'');
    b.textContent=o.t;
    b.onclick=()=>{ans[cur]=i;document.querySelectorAll('.opt').forEach((x,j)=>x.classList.toggle('on',j===i));};
    el.appendChild(b);
  });
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').textContent=cur===Qs.length-1?'결과 보기 🎉':'다음';
}
function goPrev(){if(cur>0){cur--;renderQ();}}
function goNext(){
  if(ans[cur]===null){alert('답변을 선택해주세요!');return;}
  if(cur<Qs.length-1){cur++;renderQ();}else showResult();
}

function calcScores(){
  const fl=Object.keys(CH).filter(k=>CH[k].g===gender);
  const sc={};fl.forEach(k=>sc[k]=0);
  Qs.forEach((q,qi)=>{const s=ans[qi];if(s!==null)Object.entries(q.opts[s].s).forEach(([k,v])=>{if(sc[k]!==undefined)sc[k]+=v;});});
  return Object.entries(sc).sort((a,b)=>b[1]-a[1]);
}

function showResult(){
  const sorted=calcScores();
  const [top,topSc]=sorted[0];
  const ch=CH[top];
  const now=new Date();
  const entry={name:uname,gender,char:top,emoji:ch.e,
    time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    date:now.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})};
  addLocal(entry);
  saveToSheet(entry);
  document.getElementById('re').textContent=ch.e;
  document.getElementById('rc').textContent=top;
  document.getElementById('rs').textContent=`${uname}님은 솔로나라의 ${top}입니다`;
  document.getElementById('rd').textContent=ch.desc;
  document.getElementById('rt').innerHTML=ch.traits.map(t=>`<span class="trait">${t}</span>`).join('');
  document.getElementById('rb').innerHTML=sorted.map(([n,sc],i)=>`
    <div class="sr"><span class="sn">${n}</span>
    <div class="st"><div class="sb ${i===0?'top':''}" style="width:${topSc>0?Math.round((sc/topSc)*100):0}%"></div></div>
    <span class="sv">${sc}점</span></div>`).join('');
  showQ('sr');
}

function restart(){
  gender=null;
  document.getElementById('ni').value='';
  document.getElementById('bf').classList.remove('on');
  document.getElementById('bm').classList.remove('on');
  document.getElementById('sb').disabled=true;
  document.getElementById('save-status').classList.add('hidden');
  showQ('ss');
}

// 구글 시트에서 전체 데이터 가져오기
let sheetCache = null;

async function fetchSheetData() {
  const res = await fetch(APPS_URL);
  const data = await res.json();
  sheetCache = data;
  return data;
}

async function renderStat() {
  const el = document.getElementById('stat-body');
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('stat-updated').textContent = `불러오는 중...`;
  el.innerHTML = '<div class="empty">⏳ 데이터 불러오는 중...</div>';

  let data;
  try {
    data = await fetchSheetData();
  } catch(err) {
    el.innerHTML = '<div class="empty">⚠️ 데이터를 불러오지 못했어요.<br>네트워크를 확인하거나 새로고침해주세요.</div>';
    return;
  }

  document.getElementById('stat-updated').textContent = `마지막 업데이트 ${now}`;

  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty">아직 참여자가 없어요 🥲</div>';
    return;
  }

  const fData = data.filter(d => d.gender === '여');
  const mData = data.filter(d => d.gender === '남');

  const sumHtml = `<div class="stat-summary">
    <div class="ssum"><div class="ssum-num">${data.length}</div><div class="ssum-label">전체 참여</div></div>
    <div class="ssum"><div class="ssum-num" style="color:var(--pink)">${fData.length}</div><div class="ssum-label">여성</div></div>
    <div class="ssum"><div class="ssum-num" style="color:#3949AB">${mData.length}</div><div class="ssum-label">남성</div></div>
  </div>`;

  const listHtml = `<div class="sec-title">참여자 목록</div>
    <div class="p-list">${[...data].reverse().map(d => `
      <div class="p-item">
        <div class="p-av">${d.name.charAt(0)}</div>
        <div><div class="p-name">${d.name}</div><div class="p-info">${d.emoji||'🌹'} ${d.char} · ${d.date} ${d.time}</div></div>
        <span class="p-tag ${d.gender==='여'?'f':'m'}">${d.gender}성</span>
      </div>`).join('')}</div>`;

  function cgHtml(order, gd, isF) {
    const cnt = {}; order.forEach(c => cnt[c] = 0);
    gd.forEach(d => { if(cnt[d.char] !== undefined) cnt[d.char]++; });
    const mx = Math.max(...Object.values(cnt), 1);
    return order.map(c => `<div class="char-card ${cnt[c]===0?'zero':''}" onclick="openModal('${c}')">
      <div class="ce">${CH[c].e}</div><div class="cn">${c}</div>
      <div class="ck">${cnt[c]}명</div>
      <div class="cbw"><div class="cb ${isF?'f':''}" style="width:${Math.round((cnt[c]/mx)*100)}%"></div></div>
    </div>`).join('');
  }

  const fgHtml = fData.length > 0 ? `<div class="sec-title">👩 여성 캐릭터 분포 <span style="font-weight:400;opacity:.6">(클릭하면 상세 보기)</span></div><div class="char-grid">${cgHtml(F_ORDER,fData,true)}</div>` : '';
  const mgHtml = mData.length > 0 ? `<div class="sec-title">👨 남성 캐릭터 분포 <span style="font-weight:400;opacity:.6">(클릭하면 상세 보기)</span></div><div class="char-grid">${cgHtml(M_ORDER,mData,false)}</div>` : '';

  el.innerHTML = sumHtml + listHtml + fgHtml + mgHtml;
}

function openModal(charName) {
  const ch = CH[charName];
  const data = sheetCache || [];
  const matched = data.filter(d => d.char === charName);
  document.getElementById('m-emoji').textContent = ch.e;
  document.getElementById('m-name').textContent = charName;
  document.getElementById('m-persona').textContent = ch.persona;
  document.getElementById('m-desc').textContent = ch.desc;
  document.getElementById('m-traits').innerHTML = ch.traits.map(t => `<span class="trait">${t}</span>`).join('');
  document.getElementById('m-who').textContent = matched.length > 0 ? `이 캐릭터로 매칭된 팀원 (${matched.length}명)` : '아직 이 캐릭터로 매칭된 팀원이 없어요';
  document.getElementById('m-parts').innerHTML = matched.map(d => `<div class="modal-p"><span style="font-size:16px">${d.emoji||'🌹'}</span><span style="font-weight:500">${d.name}</span><span style="color:var(--t2);font-size:12px">· ${d.date} ${d.time}</span></div>`).join('');
  document.getElementById('modal-bg').classList.remove('hidden');
}
function closeModal(e){if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.add('hidden');}
</script>
</body>
